version: '3.8'

services:
  delivery-bot:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: delivery-bot-backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      # 将宿主机上的上一级 data 目录挂载到容器内 /app/data
      - ../data:/app/data
    environment:
      - NODE_ENV=production
      # 在容器内覆盖 DATABASE_URL 路径，使其正确指向挂载的 /app/data
      - DATABASE_URL=file:../data/data.db
