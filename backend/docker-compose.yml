version: '3.8'

services:
  delivery-bot:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: delivery-bot-backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      # 将宿主机上的上一级 data 目录挂载到容器内，保证 SQLite 数据持久化
      - ../data:/app/data
      # 将当前后端目录的环境变量文件挂载到容器内
      - ./.env:/app/.env
    environment:
      - NODE_ENV=production
